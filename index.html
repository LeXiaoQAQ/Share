<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChengHao · 导航（网盘资源）</title>
  <style>
    /* 全局重置与淡蓝色背景 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    }

    body {
      background: #d9ebf5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    /* 主卡片 */
    .nav-card {
      max-width: 750px;
      width: 100%;
      background: rgba(255, 255, 255, 0.3);
      backdrop-filter: blur(3px);
      border-radius: 48px;
      padding: 3rem 1.5rem 4rem 1.5rem;
      box-shadow: 0 20px 35px -8px rgba(0, 50, 80, 0.2);
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.6);
    }

    /* 大标题 */
    h1 {
      font-size: 2.8rem;
      font-weight: 600;
      letter-spacing: 1px;
      color: #1a3e50;
      margin-bottom: 0.5rem;
      text-shadow: 2px 2px 0 rgba(255, 255, 255, 0.5);
      word-break: break-word;
    }

    /* 小标题（联系方式、网盘资源共用） */
    .section-sub {
      font-size: 1.9rem;
      font-weight: 400;
      color: #1e4a5f;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.3rem;
      background: rgba(255, 255, 255, 0.25);
      padding: 0.4rem 1.8rem;
      border-radius: 60px;
      width: fit-content;
      margin-left: auto;
      margin-right: auto;
      backdrop-filter: blur(2px);
      border: 1px solid white;
    }

    /* 联系方式小标题下方已有按钮，所以不加额外间距，但新区域需上边距 */
    .resource-section {
      margin-top: 3rem;
    }

    /* 按钮容器：横滑（用于前三个按钮） */
    .button-trio {
      display: flex;
      flex-direction: row;
      flex-wrap: nowrap;
      overflow-x: auto;
      gap: 1rem;
      padding: 0.5rem 0.2rem 1rem 0.2rem;
      margin: 2rem 0 1.5rem 0;
      scrollbar-width: thin;
      scrollbar-color: #8bb3c9 #e2f0f7;
      -webkit-overflow-scrolling: touch;
      justify-content: flex-start;
    }

    .button-trio::-webkit-scrollbar {
      height: 6px;
    }
    .button-trio::-webkit-scrollbar-track {
      background: #e2f0f7;
      border-radius: 20px;
    }
    .button-trio::-webkit-scrollbar-thumb {
      background: #8bb3c9;
      border-radius: 20px;
    }

    /* 通用按钮样式 (既用于复制按钮，也用于链接按钮) */
    .nav-btn {
      flex: 0 0 auto;
      min-width: 110px;
      padding: 0.7rem 0.2rem;
      background: white;
      border: none;
      border-radius: 40px;
      font-size: 1.3rem;
      font-weight: 500;
      color: #10435c;
      box-shadow: 0 5px 0 #8bb3c9, 0 10px 18px -8px rgba(0, 40, 60, 0.3);
      cursor: pointer;
      transition: all 0.1s ease-out;
      border: 2px solid rgba(255, 255, 255, 0.9);
      letter-spacing: 0.3px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      line-height: 1.2;
      white-space: nowrap;
      text-decoration: none;  /* 去除下划线，用于<a>标签 */
    }

    /* 按钮按下效果 */
    .nav-btn:active {
      transform: translateY(4px);
      box-shadow: 0 2px 0 #7fa3b9, 0 6px 12px -6px #1d4b5e;
    }

    /* 悬停效果 */
    .nav-btn:hover {
      background: #f5fcff;
      border-color: #bfdeff;
    }

    /* 单独按钮居中容器（用于网盘资源单个按钮） */
    .single-button {
      text-align: center;
      margin-top: 1.5rem;
    }

    /* 后续扩展占位 */
    .extra-zone {
      margin-top: 3.8rem;
      font-size: 1.3rem;
      color: #2c5e74;
      background: rgba(255, 255, 255, 0.4);
      padding: 1rem 1.5rem;
      border-radius: 60px;
      width: fit-content;
      margin-left: auto;
      margin-right: auto;
      backdrop-filter: blur(4px);
      border: 1px dashed #568ca3;
      transition: 0.2s;
      font-weight: 350;
    }

    .extra-zone:hover {
      background: rgba(255, 255, 255, 0.7);
      border-color: #347a97;
    }

    /* 手机窄屏微调 */
    @media (max-width: 500px) {
      h1 {
        font-size: 2.2rem;
      }
      .section-sub {
        font-size: 1.6rem;
        padding: 0.3rem 1.2rem;
      }
      .nav-btn {
        min-width: 100px;
        font-size: 1.2rem;
        padding: 0.6rem 0.2rem;
      }
      .button-trio {
        gap: 0.8rem;
      }
    }
  </style>
</head>
<body>
  <div class="nav-card">
    <!-- 大标题 -->
    <h1>ChengHao的网址导航</h1>

    <!-- 📱联系方式 区域 -->
    <div class="section-sub">
      <span>📱</span> 联系方式
    </div>
    <div class="button-trio">
      <button class="nav-btn" id="qqBtn">QQ</button>
      <button class="nav-btn" id="yunhuBtn">云湖</button>
      <button class="nav-btn" id="jiuliaoBtn">旧聊</button>
    </div>

    <!-- 新增：网盘资源区域 -->
    <div class="resource-section">
      <div class="section-sub">☁️网盘资源</div>
      <div class="single-button">
        <a href="https://pan.axooo.cn/s/q54OCg" class="nav-btn" target="_blank" rel="noopener noreferrer">Axzzz云盘</a>
      </div>
    </div>

      <script>
    (function() {
      // 获取三个复制按钮
      const qqButton = document.getElementById('qqBtn');
      const yunhuButton = document.getElementById('yunhuBtn');
      const jiuliaoButton = document.getElementById('jiuliaoBtn');

      // 通用复制+定时恢复函数
      function setupCopyButton(btn, copyText, originalText, successText, delay = 2000) {
        let timer = null;

        btn.addEventListener('click', function(event) {
          event.preventDefault();

          navigator.clipboard.writeText(copyText).then(() => {
            if (timer) clearTimeout(timer);
            btn.textContent = successText;
            timer = setTimeout(() => {
              btn.textContent = originalText;
              timer = null;
            }, delay);
          }).catch(err => {
            alert('复制失败，请手动复制: ' + copyText);
            console.warn('复制失败: ', err);
          });
        });
      }

      // 分别设置三个按钮
      setupCopyButton(qqButton, '3918869229', 'QQ', '已复制Q号');
      setupCopyButton(yunhuButton, '3486595', '云湖', '已复制ID');
      setupCopyButton(jiuliaoButton, '114514191980', '旧聊', '已复制ID');
    })();
  </script>
</body>
</html>
